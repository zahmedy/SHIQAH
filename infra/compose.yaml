services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: autointel
      POSTGRES_PASSWORD: autointel
      POSTGRES_DB: autointel
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U autointel -d autointel"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - pgdata:/var/lib/postgresql/data

  opensearch:
    image: opensearchproject/opensearch:2.19.4
    environment:
      discovery.type: single-node
      DISABLE_SECURITY_PLUGIN: "true"
      DISABLE_INSTALL_DEMO_CONFIG: "true"
      bootstrap.memory_lock: "true"
      OPENSEARCH_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - osdata:/usr/share/opensearch/data

  api:
    build:
      context: ../apps/api
      dockerfile: Dockerfile
    command: >
      /bin/sh -c "
      alembic upgrade head &&
      uvicorn app.main:app --host 0.0.0.0 --port 8000
      "
    environment:
      ENV: dev
      API_HOST: 0.0.0.0
      API_PORT: 8000
      DATABASE_URL: postgresql+psycopg://autointel:autointel@db:5432/autointel
      JWT_SECRET: change-me-super-secret
      OPENSEARCH_URL: http://opensearch:9200
      OPENSEARCH_INDEX: autointel_cars
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_VISION_MODEL: ${OPENAI_VISION_MODEL:-gpt-4o-mini}
      OPENAI_TEXT_MODEL: ${OPENAI_TEXT_MODEL:-gpt-4o-mini}
      VIN_SCAN_DEBUG: ${VIN_SCAN_DEBUG:-false}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      opensearch:
        condition: service_started

  web:
    build:
      context: ../apps/web
      dockerfile: Dockerfile
    environment:
      INTERNAL_API_BASE: http://api:8000
      NEXT_PUBLIC_API_BASE: http://localhost:8000
    ports:
      - "3001:3001"
    depends_on:
      api:
        condition: service_started

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data

  createbuckets:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_started
    entrypoint: >
      /bin/sh -c "
      until /usr/bin/mc alias set local http://minio:9000 minioadmin minioadmin; do sleep 1; done;
      /usr/bin/mc mb -p local/autointel-media || true;
      /usr/bin/mc anonymous set download local/autointel-media || true;
      echo '[{"AllowedOrigin":["http://localhost:3001","http://localhost:3000"],"AllowedMethod":["GET","PUT","HEAD"],"AllowedHeader":["*"],"ExposeHeader":["ETag"],"MaxAgeSeconds":3000}]' > /tmp/autointel-cors.json;
      /usr/bin/mc cors set local/autointel-media /tmp/autointel-cors.json || true;
      exit 0;
      "

volumes:
  pgdata:
  osdata:
  miniodata:
