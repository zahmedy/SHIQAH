services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: garaj
      POSTGRES_PASSWORD: garaj
      POSTGRES_DB: garaj
    ports: ["5432:5432"]
    volumes:
      - pgdata:/var/lib/postgresql/data
  opensearch:
    image: opensearchproject/opensearch:2
    environment:
      - discovery.type=single-node
      - plugins.security.disabled=true
      - OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"

volumes:
  pgdata:
