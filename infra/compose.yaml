services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: garaj
      POSTGRES_PASSWORD: garaj
      POSTGRES_DB: garaj
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U garaj -d garaj"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - pgdata:/var/lib/postgresql/data

  opensearch:
    image: opensearchproject/opensearch:2.19.4
    environment:
      discovery.type: single-node
      DISABLE_SECURITY_PLUGIN: "true"
      DISABLE_INSTALL_DEMO_CONFIG: "true"
      bootstrap.memory_lock: "true"
      OPENSEARCH_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - osdata:/usr/share/opensearch/data

  api:
    build:
      context: ../apps/api
      dockerfile: Dockerfile
    environment:
      ENV: dev
      API_HOST: 0.0.0.0
      API_PORT: 8000
      DATABASE_URL: postgresql+psycopg://garaj:garaj@db:5432/garaj
      JWT_SECRET: change-me-super-secret
      OPENSEARCH_URL: http://opensearch:9200
      OPENSEARCH_INDEX: garaj_cars
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      opensearch:
        condition: service_started
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data

  createbuckets:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_started
    entrypoint: >
      /bin/sh -c "
      until /usr/bin/mc alias set local http://minio:9000 minioadmin minioadmin; do sleep 1; done;
      /usr/bin/mc mb -p local/garaj-media || true;
      /usr/bin/mc anonymous set download local/garaj-media || true;
      exit 0;
      "

volumes:
  pgdata:
  osdata:
  miniodata:
